version: "3.9"

services:
  api:
    build: .
    container_name: pulsenet-api
    command: python main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    environment:
      - PULSENET_JWT_SECRET=${PULSENET_JWT_SECRET}
      - PULSENET_ENCRYPTION_KEY=${PULSENET_ENCRYPTION_KEY}
      - PYTHONPATH=/app/src
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pulsenet-back
    restart: unless-stopped

  dashboard:
    build: .
    container_name: pulsenet-dashboard
    command: streamlit run src/pulsenet/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    environment:
      - PYTHONPATH=/app/src
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      api:
        condition: service_healthy
    networks:
      - pulsenet-front
      - pulsenet-back
    restart: unless-stopped

  mlflow:
    image: python:3.12-slim
    container_name: pulsenet-mlflow
    command: >
      bash -c "pip install mlflow==2.19.0 && mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - pulsenet-back
    restart: unless-stopped

networks:
  pulsenet-front:
  pulsenet-back:
