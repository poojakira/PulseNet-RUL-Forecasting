# ============================================================
# PulseNet — Docker Compose (API + Dashboard + Streaming)
# ============================================================
# Usage: docker-compose up --build

version: "3.9"

services:
  # --- FastAPI Backend ---
  api:
    build: .
    container_name: pulsenet-api
    command: python main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      - PULSENET_JWT_SECRET=change-me-in-production
      - PULSENET_ENCRYPTION_KEY=
      - PYTHONPATH=/app/src
      - NCCL_DEBUG=INFO
      - NVIDIA_VISIBLE_DEVICES=all
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # --- Streamlit Dashboard ---
  dashboard:
    build: .
    container_name: pulsenet-dashboard
    command: streamlit run src/pulsenet/dashboard/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      - PYTHONPATH=/app/src
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - api
    restart: unless-stopped

  # --- Streaming Worker ---
  streaming:
    build: .
    container_name: pulsenet-streaming
    command: python main_pipeline.py --mode stream
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app/src
      - NVIDIA_VISIBLE_DEVICES=all
      - NCCL_DEBUG=INFO
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - api
      - mlflow
    restart: unless-stopped

  # --- MLflow Tracking Server ---
  mlflow:
    image: python:3.11-slim
    container_name: pulsenet-mlflow
    command: >
      bash -c "pip install mlflow && mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root ./mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./mlruns:/mlruns
    restart: unless-stopped
