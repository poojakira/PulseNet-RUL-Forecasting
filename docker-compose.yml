# ============================================================
# PulseNet — Industrial Docker Compose Stack
# ============================================================
version: "3.9"

services:
  # --- FastAPI Inference Server ---
  api:
    build: .
    container_name: pulsenet-api
    command: python main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PULSENET_JWT_SECRET=production-secret-99
      - PULSENET_ENCRYPTION_KEY=${PULSENET_ENCRYPTION_KEY}
      - PYTHONPATH=/app/src
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pulsenet-back
    restart: unless-stopped

  # --- Streamlit Operational Dashboard ---
  dashboard:
    build: .
    container_name: pulsenet-dashboard
    command: streamlit run src/pulsenet/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      api:
        condition: service_healthy
    networks:
      - pulsenet-front
      - pulsenet-back
    restart: unless-stopped

  # --- MLflow Tracking Server ---
  mlflow:
    image: python:3.11-slim
    container_name: pulsenet-mlflow
    command: >
      bash -c "pip install mlflow && mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root ./mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    networks:
      - pulsenet-back
    restart: unless-stopped

networks:
  pulsenet-front:
  pulsenet-back:
