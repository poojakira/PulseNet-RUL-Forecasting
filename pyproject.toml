[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pulsenet"
version = "2.1.0"
requires-python = ">=3.11"
description = "Production ML system for predictive maintenance using NASA C-MAPSS turbofan engine data"
authors = [{name = "Pooja Kiran"}]
license = {text = "Apache-2.0"}
readme = "README.md"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pyright]
include = ["src", "tests"]
extraPaths = ["src"]
pythonVersion = "3.11"
typeCheckingMode = "off"

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
# Only enforce critical syntax/security rules; style rules are advisory
select = ["E9", "F63", "F7"]

[tool.ruff.lint.isort]
known-first-party = ["pulsenet"]

[tool.pyre]
source_directories = ["src", "tests"]
search_path = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
