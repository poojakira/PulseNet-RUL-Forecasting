[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pulsenet"
version = "2.1.0"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pyright]
include = ["src", "tests"]
extraPaths = ["src"]
pythonVersion = "3.11"
typeCheckingMode = "strict"
reportMissingImports = "error"
reportOptionalMemberAccess = "error"
reportGeneralTypeIssues = "error"
reportPrivateImportUsage = "none"

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "B", "I", "N", "UP", "PL", "RUF", "S"]
ignore = ["S101", "S105"] # S101 is assert (useful in tests), S105 is hardcoded password (already fixed in auth.py)

[tool.ruff.lint.isort]
known-first-party = ["pulsenet"]

[tool.pyre]
source_directories = ["src", "tests"]
search_path = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
