[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pulsenet"
version = "2.1.0"
requires-python = ">=3.11"
description = "Production ML system for predictive maintenance using NASA C-MAPSS turbofan engine data"
authors = [{name = "Pooja Kiran"}]
license = {text = "Apache-2.0"}
readme = "README.md"

[project.optional-dependencies]
# Run-time deps with no version pins — the canonical pinned set lives in
# requirements.txt (which is what CI and Docker use). Listing here so
# `pip install -e .` works for local development.
runtime = [
    "pandas>=2.0",
    "numpy>=1.24",
    "scipy>=1.10",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "scikit-learn>=1.3",
    "joblib>=1.3",
    "torch>=2.0",
    "fastapi>=0.104",
    "uvicorn[standard]>=0.24",
    "pydantic>=2.4",
    "python-jose[cryptography]>=3.3",
    "passlib[bcrypt]>=1.7",
    "python-multipart>=0.0.6",
    "cryptography>=41",
    "streamlit>=1.28",
    "plotly>=5.18",
    "psutil>=5.9",
    "matplotlib>=3.8",
    "prometheus-client>=0.19",
    "requests>=2.31",
]
dev = [
    "ruff==0.6.9",
    "pyright==1.1.385",
    "pytest>=7.4",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.1",
    "httpx>=0.25",
    "pip-audit==2.7.3",
    "bandit==1.7.10",
    "pip-tools>=7.4",  # for `pip-compile` lockfile generation
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pyright]
include = ["src", "tests"]
extraPaths = ["src"]
pythonVersion = "3.11"
typeCheckingMode = "off"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
# Production lint enforcement — these are 2026 baseline rules for industrial Python:
#   E   = pycodestyle errors           F   = pyflakes (unused imports, undefined names)
#   W   = pycodestyle warnings         B   = bugbear (likely-bugs)
#   I   = isort import order           UP  = pyupgrade (modernize syntax)
#   N   = naming conventions           S   = bandit security warnings
#   PTH = pathlib over os.path         RUF = ruff-specific
select = ["E", "F", "W", "B", "I", "UP", "N", "S", "PTH", "RUF"]
# Ignore rules that conflict with this project's conventions or have many
# acceptable false-positives in scientific Python:
ignore = [
    "E501",   # line too long (handled by formatter)
    "S101",   # asserts in tests are fine
    "S104",   # 0.0.0.0 bind is intentional in containers
    "S301",   # joblib pickle is the standard sklearn artifact format
    "S311",   # numpy.random for non-crypto sims is fine
    "B008",   # FastAPI uses Depends() in defaults intentionally
    "N803",   # ML conventions use uppercase X for matrices
    "N806",   # same — X / X_train / X_test are conventional
    "UP007",  # Optional[X] is more readable than X | None for type aliases here
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S105", "S106", "S107"]  # hardcoded test passwords are fine
"scripts/**" = ["T201"]                  # print() in CLI scripts is fine

[tool.ruff.lint.isort]
known-first-party = ["pulsenet"]

[tool.pyre]
source_directories = ["src", "tests"]
search_path = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
