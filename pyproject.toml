[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pulsenet"
version = "2.1.0"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pyright]
include = ["src", "tests"]
extraPaths = ["src"]
pythonVersion = "3.11"
typeCheckingMode = "strict"
reportMissingImports = "error"
reportOptionalMemberAccess = "error"
reportGeneralTypeIssues = "error"
reportPrivateImportUsage = "none"

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "B", "I", "N", "UP", "PL", "RUF", "S"]
ignore = [
  "S101",   # assert used in tests
  "S105",   # hardcoded password
  "S106",   # hardcoded password in function arg
  "S107",   # hardcoded password default
  "S311",   # random not for cryptography
  "S603",   # subprocess call
  "S607",   # partial executable path
  "PLR2004", # magic value comparisons
  "PLR0913", # too many arguments
  "PLR0912", # too many branches
  "PLR0915", # too many statements
  "PLR0911", # too many return statements
  "PLR0914", # too many local variables
  "RUF059", # unpacked variable never used
  "UP035",  # deprecated typing imports (collections.abc)
  "UP006",  # use type instead of Type
  "UP007",  # use X | Y instead of Optional
  "UP038",  # use X | Y in isinstance
  "N803",   # argument name should be lowercase
  "N806",   # variable in function should be lowercase
  "N815",   # mixed case variable name
  "N818",   # exception name should end in Error
  "B006",   # mutable default argument
  "B007",   # loop control variable not used
  "B008",   # function call in default argument
  "B010",   # do not call setattr with constant attribute value
  "E501",   # line too long (handled by formatter)
  "E731",   # do not assign a lambda expression
  "E741",   # ambiguous variable name
]

[tool.ruff.lint.isort]
known-first-party = ["pulsenet"]

[tool.pyre]
source_directories = ["src", "tests"]
search_path = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
