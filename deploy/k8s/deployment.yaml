apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsenet-api
  namespace: pulsenet
  labels:
    app.kubernetes.io/name: pulsenet
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pulsenet-rul-forecasting
    app.kubernetes.io/version: "2.1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsenet
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsenet
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: pulsenet-rul-forecasting
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pulsenet-sa
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - pulsenet
                topologyKey: kubernetes.io/hostname
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - api
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: api
          image: pulsenet/api:2.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-api
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pulsenet-config
            - secretRef:
                name: pulsenet-secrets
          env:
            - name: PULSENET_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pulsenet-secrets
                  key: PULSENET_JWT_SECRET
            - name: PULSENET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pulsenet-secrets
                  key: PULSENET_ENCRYPTION_KEY
            - name: PULSENET_USERS
              valueFrom:
                secretKeyRef:
                  name: pulsenet-secrets
                  key: PULSENET_USERS
            - name: PULSENET_ARTIFACT_MANIFEST_KEY
              valueFrom:
                secretKeyRef:
                  name: pulsenet-secrets
                  key: PULSENET_ARTIFACT_MANIFEST_KEY
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: runtime
              mountPath: /app/.runtime
            - name: api-models
              mountPath: /app/models
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "kill -TERM 1 && sleep 30"]
      volumes:
        - name: tmp
          emptyDir: {}
        - name: runtime
          emptyDir: {}
        - name: api-models
          persistentVolumeClaim:
            claimName: pulsenet-api-models
