apiVersion: v1
kind: ConfigMap
metadata:
  name: pulsenet-config
  namespace: pulsenet
  labels:
    app.kubernetes.io/name: pulsenet
    app.kubernetes.io/part-of: pulsenet-rul-forecasting
data:
  PULSENET_ENV: "production"
  PULSENET_LOG_LEVEL: "INFO"
  PULSENET_LOG_FORMAT: "json"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  API_RATE_LIMIT: "100"
  API_CORS_ORIGINS: '["https://pulsenet.example.com"]'
  DATA_ROLLING_WINDOW: "5"
  DATA_HEALTHY_CYCLE_LIMIT: "50"
  DATA_FAILURE_RUL_THRESHOLD: "30"
  MODEL_ACTIVE_MODEL: "isolation_forest"
  MODEL_ISOLATION_FOREST_N_ESTIMATORS: "200"
  MODEL_ISOLATION_FOREST_CONTAMINATION: "0.05"
  STREAMING_QUEUE_MAX_SIZE: "1000"
  STREAMING_BATCH_SIZE: "32"
  BLOCKCHAIN_ENABLE_MERKLE: "true"
  MLOPS_DRIFT_THRESHOLD: "0.1"
  MLOPS_AUTO_RETRAIN: "true"
  MLOPS_MONITOR_INTERVAL_SEC: "3600"
  DASHBOARD_REFRESH_INTERVAL_SEC: "5"
