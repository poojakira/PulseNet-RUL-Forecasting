# Auto-provisioned Prometheus datasource for Grafana.
# Loaded by Grafana on first boot via the provisioning/ mount in docker-compose.yml.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s
