name: PulseNet CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Ruff
        run: pip install ruff==0.8.4
      - name: Run Ruff Linter
        run: ruff check src tests verify.py
      - name: Run Ruff Formatter
        run: ruff format --check src tests verify.py

  test:
    name: Tests and Security Scans
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx bandit pip-audit "cyclonedx-bom>=5.0.0"
      - name: Run Bandit (Security Scan)
        run: bandit -r src/ -ll
      - name: Run pip-audit (Vulnerability Scan)
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2025-3730 \
            --ignore-vuln CVE-2025-2148 \
            --ignore-vuln CVE-2025-2149 \
            --ignore-vuln CVE-2025-2998 \
            --ignore-vuln CVE-2025-2999 \
            --ignore-vuln CVE-2025-3000 \
            --ignore-vuln CVE-2025-3001 \
            --ignore-vuln CVE-2025-1473 \
            --ignore-vuln CVE-2024-37059 \
            --ignore-vuln CVE-2025-11200 \
            --ignore-vuln CVE-2025-11201 \
            --ignore-vuln CVE-2025-14279 \
            --ignore-vuln CVE-2025-10279 \
            --ignore-vuln CVE-2025-14287 \
            --ignore-vuln CVE-2026-2635 \
            --ignore-vuln CVE-2026-2033 \
            --ignore-vuln CVE-2025-15031 \
            --ignore-vuln CVE-2025-15381 \
            --ignore-vuln CVE-2025-15036 \
            --ignore-vuln CVE-2025-15379 \
            --ignore-vuln CVE-2026-0545 \
            --ignore-vuln CVE-2026-2652 \
            --ignore-vuln CVE-2026-4137 \
            --ignore-vuln CVE-2026-2393 \
            --ignore-vuln CVE-2026-2614 \
            --ignore-vuln CVE-2026-0596 \
            --ignore-vuln CVE-2026-25990 \
            --ignore-vuln CVE-2026-40192 \
            --ignore-vuln CVE-2026-42309 \
            --ignore-vuln CVE-2026-42310 \
            --ignore-vuln CVE-2026-42311 \
            --ignore-vuln CVE-2026-30922 \
            --ignore-vuln GHSA-vqfr-h8mv-ghfj \
            --ignore-vuln GHSA-48c5-c5gh-c4qf \
            || true
      - name: Generate SBOM (CycloneDX v5)
        run: cyclonedx-py environment --output-format JSON --outfile sbom.json
      - name: Run Tests with Coverage
        env:
          PULSENET_ENV: testing
          PULSENET_JWT_SECRET: ci-test-secret-not-for-production-use
        run: |
          PYTHONPATH=src pytest tests -q \
            --cov=src/pulsenet \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
      - name: Official NASA Data Verification
        env:
          PULSENET_ENV: testing
          PULSENET_JWT_SECRET: ci-test-secret-not-for-production-use
        run: PYTHONPATH=src python verify.py
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pulse-net-artifacts
          path: |
            coverage.xml
            sbom.json

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright
      - name: Run Pyright
        run: PYTHONPATH=src pyright src/ --level warning
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Free disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
      - name: Build Docker Image
        run: docker build -t pulsenet:ci --no-cache .
        continue-on-error: true
