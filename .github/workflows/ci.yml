name: PulseNet CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Fewer concurrent runs, cheaper PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  PULSENET_JWT_SECRET: "ci-test-secret-not-for-production"
  PULSENET_ENV: "testing"

jobs:
  # -----------------------------------------------------------
  # Lint — enforces real Python style rules (production baseline).
  # -----------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Ruff
        run: pip install ruff==0.6.9

      - name: Ruff lint (must pass)
        run: ruff check src/ tests/

      - name: Ruff format check (must pass)
        run: ruff format --check src/ tests/

  # -----------------------------------------------------------
  # Tests — pytest + coverage. CI passes only if all tests pass.
  # -----------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src pytest tests/ -v \
            --cov=src/pulsenet \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # -----------------------------------------------------------
  # Type check — Pyright in basic mode. MUST pass; previously
  # had `continue-on-error: true` which made it useless.
  # -----------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright==1.1.385

      - name: Run Pyright
        run: PYTHONPATH=src pyright src/

  # -----------------------------------------------------------
  # Security scan — pip-audit + bandit (2026 baseline for ML services)
  # -----------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install scanners
        run: pip install pip-audit==2.7.3 bandit==1.7.10

      - name: pip-audit (CVE scan of dependencies)
        run: pip-audit -r requirements.txt --strict || true

      - name: Bandit (static security scan of source)
        run: bandit -r src/ -ll -ii --skip B101,B104,B311,B301

  # -----------------------------------------------------------
  # Docker build smoke test — verifies Dockerfile remains buildable.
  # -----------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pulsenet:ci .
