name: PulseNet CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: pip install ruff==0.8.4

      - name: Run Ruff Linter
        run: ruff check src tests scripts verify.py

      - name: Run Ruff Formatter
        run: ruff format --check src tests scripts verify.py

  test:
    name: Tests and Security Scans
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx bandit pip-audit cyclonedx-bom

      - name: Run Bandit (Security Scan)
        run: bandit -r src/ -ll

      - name: Run pip-audit (Vulnerability Scan)
        run: pip-audit -r requirements.txt

      - name: Generate SBOM (CycloneDX)
        run: cyclonedx-py requirements requirements.txt --output-format json --output-file sbom.json

      - name: Run Tests with Coverage
        run: |
          PYTHONPATH=src pytest tests -q \
            --cov=src/pulsenet \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Official NASA Data Verification
        run: PYTHONPATH=src python verify.py

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-net-artifacts
          path: |
            coverage.xml
            sbom.json

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright

      - name: Run Pyright
        run: PYTHONPATH=src pyright src/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t pulsenet:ci --no-cache .
