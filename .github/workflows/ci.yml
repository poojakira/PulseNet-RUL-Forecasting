name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PULSENET_ENV: testing
  PULSENET_JWT_SECRET: pulsenet-test-secret-not-for-production

jobs:
  quality:
    name: Quality and packaging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build twine

      - name: Lint
        run: ruff check src tests attack_mapping scripts --output-format=github

      - name: Format check
        run: ruff format --check src tests attack_mapping scripts

      - name: Type check critical runtime modules
        run: pyright src/pulsenet/api src/pulsenet/config.py src/pulsenet/security

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Test wheel installation
        run: |
          python -m venv /tmp/pulsenet-wheel
          /tmp/pulsenet-wheel/bin/pip install dist/*.whl
          PULSENET_ENV=testing PULSENET_JWT_SECRET=pulsenet-test-secret-not-for-production \
            /tmp/pulsenet-wheel/bin/python -c "import pulsenet; import pulsenet.api.app"

  test:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests -v --tb=short \
            --cov=pulsenet \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error
          retention-days: 30

  security:
    name: Dependency and source audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit dependencies
        run: pip-audit --strict

      - name: Static security scan
        run: bandit -r src/pulsenet -ll

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Initialize CodeQL
        uses: github/codeql-action/init@192325c86100d080feab897ff886c34abd4c83a3
        with:
          languages: python
          queries: +security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@192325c86100d080feab897ff886c34abd4c83a3
