name: PulseNet CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: pip install ruff==0.8.4

      - name: Run Ruff Linter
        run: ruff check src tests verify.py
        # scripts/ excluded — ddp_benchmark requires CUDA/torchrun env

      - name: Run Ruff Formatter
        run: ruff format --check src tests verify.py

  test:
    name: Tests and Security Scans
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx bandit pip-audit "cyclonedx-bom>=5.0.0"

      - name: Run Bandit (Security Scan)
        run: bandit -r src/ -ll

      - name: Run pip-audit (Vulnerability Scan)
        run: pip-audit -r requirements.txt

      - name: Generate SBOM (CycloneDX v5)
        run: cyclonedx-py environment --output-format JSON --outfile sbom.json

      - name: Run Tests with Coverage
        env:
          PULSENET_ENV: testing
          PULSENET_JWT_SECRET: ci-test-secret-not-for-production-use
        run: |
          PYTHONPATH=src pytest tests -q \
            --cov=src/pulsenet \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Official NASA Data Verification
        env:
          PULSENET_ENV: testing
          PULSENET_JWT_SECRET: ci-test-secret-not-for-production-use
        run: PYTHONPATH=src python verify.py

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pulse-net-artifacts
          path: |
            coverage.xml
            sbom.json

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright

      - name: Run Pyright
        run: PYTHONPATH=src pyright src/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h
      - name: Build Docker Image
        run: docker build -t pulsenet:ci --no-cache .
        continue-on-error: true
