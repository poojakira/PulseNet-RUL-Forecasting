name: PulseNet CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Ruff
        run: pip install ruff==0.11.8
      - name: Run Ruff Linter
        run: ruff check src tests scripts verify.py
      - name: Run Ruff Formatter
        run: ruff format --check src tests scripts verify.py

  test:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx httpx2
      - name: Download Official NASA C-MAPSS Dataset
        # The C-MAPSS archive is not committed (large binary, gitignored). Fetch
        # the public NASA dataset and verify its SHA-256 before tests/verify run.
        run: python scripts/download_data.py
      - name: Run Tests with Coverage Gate
        run: |
          PYTHONPATH=src pytest tests -q \
            --cov=src/pulsenet \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
      - name: Official NASA Data Verification
        run: PYTHONPATH=src python verify.py
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit==1.8.3 cyclonedx-bom==5.1.1 pip-audit==2.10.1
      - name: Bandit SAST
        run: bandit -r src/ -ll
      - name: pip-audit
        # NOTE: The remaining accepted advisory is from ecdsa, a transitive
        # dependency of python-jose with no patched release available.
        # Starlette advisories are remediated by the pinned 1.3.1 release.
        run: >
          pip-audit -r requirements.txt --skip-editable
          --ignore-vuln PYSEC-2026-1325
      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format JSON --outfile sbom.json
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: pulsenet-sbom
          path: sbom.json

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright
      - name: Run Pyright
        run: PYTHONPATH=src pyright src/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Build Docker Image
        run: docker build -t pulsenet:ci --no-cache .
