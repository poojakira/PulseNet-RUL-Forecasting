name: PulseNet CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Ruff
        run: pip install ruff==0.11.8
      - name: Run Ruff Linter
        run: ruff check src tests scripts verify.py
      - name: Run Ruff Formatter
        run: ruff format --check src tests scripts verify.py

  test:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run Tests with Coverage Gate
        run: |
          PYTHONPATH=src pytest tests -q \
            --cov=src/pulsenet \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
      - name: Official NASA Data Verification
        run: PYTHONPATH=src python verify.py
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit==1.8.3 cyclonedx-bom==5.1.1 pip-audit==2.8.2
      - name: Bandit SAST
        run: bandit -r src/ -ll
      - name: pip-audit
        run: pip-audit -r requirements.txt --skip-editable || true
      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format JSON --outfile sbom.json
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulsenet-sbom
          path: sbom.json

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright
      - name: Run Pyright
        run: PYTHONPATH=src pyright src/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t pulsenet:ci --no-cache .
